<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Configurações - VisionIA</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <script>
    if (!localStorage.getItem("token")) {
      window.location.href = "/login";
    }
  </script>

  <div class="topbar">
    <div class="topbar-left">
      <img src="assets/logo.png" class="logo-topbar" alt="Logo do VisionIA">
    </div>

    <div class="user-access" onclick="toggleMenu()">
      <div class="user-avatar" id="userAvatar">US</div>

      <div class="user-info">
        <div class="user-name" id="userName"></div>
        <div class="user-role" id="userRole"></div>
      </div>

      <div class="dropdown-menu" id="userMenu">
        <div class="dropdown-item" onclick="voltarInicio()">Início</div>
        <div class="dropdown-item logout" onclick="logout()">Sair</div>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="card">

      <div class="section-title">Configurações</div>

      <div class="section">
        <h3>Perfil</h3>

        <div class="form-grid">
          <div class="input-group">
            <label>Nome</label>
            <input type="text" id="nome" placeholder="Seu nome">
          </div>

          <div class="input-group">
            <label>E-mail</label>
            <input type="email" id="email" placeholder="Seu e-mail">
          </div>

          <div class="input-group">
            <label>Telefone</label>
            <input type="tel" id="telefone" placeholder="Seu telefone">
          </div>
        </div>

        <button class="btn-green" onclick="salvarPerfil()">Salvar perfil</button>
      </div>

      <div class="section">
        <h3>Preferências</h3>

        <div class="settings-grid">
          <div class="settings-card">
            <h4>Relatórios</h4>
            <label class="checkbox">
              <input type="checkbox" id="emailCheck">
              Receber relatórios por e-mail
            </label>
          </div>

          <div class="settings-card">
            <h4>Novidades</h4>
            <label class="checkbox">
              <input type="checkbox" id="novidadesCheck">
              Quero receber novidades
            </label>
          </div>

          <div class="settings-card">
            <h4>Lembretes</h4>
            <label class="checkbox">
              <input type="checkbox" id="lembretesCheck">
              Ativar lembretes automáticos
            </label>
          </div>

          <div class="settings-card">
            <h4>Notificações</h4>
            <label class="checkbox">
              <input type="checkbox" id="notifEmailCheck">
              Receber notificações por e-mail
            </label>

            <label class="checkbox">
              <input type="checkbox" id="notifSistemaCheck">
              Receber notificações no sistema
            </label>
          </div>
        </div>
      </div>

      <div class="section">
        <h3>Feedback</h3>
        <p class="small">Deixe sua opinião sobre a plataforma.</p>

        <div class="input-group">
          <textarea id="feedbackTexto" class="feedback-textarea" placeholder="Escreva seu feedback..."></textarea>
        </div>

        <button class="button" onclick="enviarFeedback()">Enviar feedback</button>
      </div>

      <div class="section">
        <h3>Suporte</h3>
        <p class="small">Está com algum problema?</p>

        <button class="button" onclick="abrirSuporte()">Falar com suporte</button>
      </div>

    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/configuration.js"></script>

  <style>
  .suporte-fab {
    position: fixed;
    bottom: 28px;
    right: 28px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 10px;
  }
 
  .suporte-menu {
    display: none;
    flex-direction: column;
    gap: 8px;
    align-items: flex-end;
  }
 
  .suporte-menu.aberto {
    display: flex;
  }
 
  .suporte-opcao {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #fff;
    border-radius: 50px;
    padding: 10px 18px 10px 14px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.13);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    color: #1e293b;
    transition: transform 0.15s, box-shadow 0.15s;
    white-space: nowrap;
  }
 
  .suporte-opcao:hover {
    transform: translateX(-4px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.18);
  }
 
  .suporte-opcao .icone {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
 
  .suporte-opcao.whatsapp .icone { background: #25D366; }
  .suporte-opcao.email    .icone { background: #EA4335; }
 
  .suporte-btn-principal {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: #0f2744;
    color: #fff;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    font-size: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.2s;
    position: relative;
  }
 
  .suporte-btn-principal:hover {
    background: #1a3a5c;
    transform: scale(1.08);
  }
 
  .suporte-btn-principal .icone-fechar { display: none; }
  .suporte-btn-principal.aberto .icone-abrir  { display: none; }
  .suporte-btn-principal.aberto .icone-fechar { display: block; }
 
  .suporte-tooltip {
    position: absolute;
    right: 60px;
    background: #0f2744;
    color: #fff;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 6px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
 
  .suporte-btn-principal:hover .suporte-tooltip {
    opacity: 1;
  }

  .suporte-badge {
    position: absolute;
    top: -2px;
    right: -2px;
    width: 14px;
    height: 14px;
    background: #22c55e;
    border-radius: 50%;
    border: 2px solid #fff;
    animation: pulse-badge 2s infinite;
  }
 
  @keyframes pulse-badge {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.2); }
  }
</style>

<div class="suporte-fab" id="suporteFab">

  <div class="suporte-menu" id="suporteMenu">

    <a href="https://wa.me/5592900000000?text=Ol%C3%A1%2C%20preciso%20de%20suporte%20com%20o%20VisionIA."
       target="_blank"
       rel="noopener noreferrer"
       class="suporte-opcao whatsapp"
       onclick="fecharSuporteMenu()">
      <span class="icone">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
          <path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.118 1.528 5.856L.057 23.882a.5.5 0 00.611.611l6.056-1.472A11.934 11.934 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.006-1.373l-.36-.213-3.714.902.922-3.682-.234-.378A9.818 9.818 0 1112 21.818z"/>
        </svg>
      </span>
      Suporte via WhatsApp
    </a>

    <a href="mailto:project.visionia@gmail.com?subject=Suporte%20VisionIA&body=Olá%2C%20preciso%20de%20ajuda%20com%20o%20seguinte%20problema%3A%0A%0A"
       class="suporte-opcao email"
       onclick="fecharSuporteMenu()">
      <span class="icone">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
          <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
        </svg>
      </span>
      Enviar e-mail para o suporte
    </a>
 
  </div>

  <button class="suporte-btn-principal" id="suporteBtn" onclick="toggleSuporteMenu()" aria-label="Suporte">
    <span class="suporte-tooltip">Precisa de ajuda?</span>
    <span class="suporte-badge"></span>
    <span class="icone-abrir">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/>
      </svg>
    </span>
    <span class="icone-fechar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
      </svg>
    </span>
  </button>
 
</div>

<script>
  function toggleSuporteMenu() {
    const menu = document.getElementById("suporteMenu");
    const btn  = document.getElementById("suporteBtn");
    const aberto = menu.classList.toggle("aberto");
    btn.classList.toggle("aberto", aberto);
  }
 
  function fecharSuporteMenu() {
    document.getElementById("suporteMenu").classList.remove("aberto");
    document.getElementById("suporteBtn").classList.remove("aberto");
  }

  document.addEventListener("click", function(e) {
    const fab = document.getElementById("suporteFab");
    if (fab && !fab.contains(e.target)) {
      fecharSuporteMenu();
    }
  });
</script>
</body>
</html>
