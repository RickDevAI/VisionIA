<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Configurações - VisionIA</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <script>
    if (!localStorage.getItem("token")) {
      window.location.href = "login.html";
    }
  </script>

  <div class="topbar">
    <div class="topbar-left">
      <img src="assets/logo.png" class="logo-topbar" alt="Logo do VisionIA">
    </div>

    <div class="user-access" onclick="toggleMenu()">
      <div class="user-avatar" id="userAvatar">US</div>

      <div class="user-info">
        <div class="user-name" id="userName"></div>
        <div class="user-role" id="userRole"></div>
      </div>

      <div class="dropdown-menu" id="userMenu">
        <div class="dropdown-item" onclick="voltarInicio()">Início</div>
        <div class="dropdown-item logout" onclick="logout()">Sair</div>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="card">

      <div class="section-title">Configurações</div>

      <div class="section">
        <h3>Perfil</h3>

        <div class="form-grid">
          <div class="input-group">
            <label>Nome</label>
            <input type="text" id="nome" placeholder="Seu nome">
          </div>

          <div class="input-group">
            <label>E-mail</label>
            <input type="email" id="email" placeholder="Seu e-mail">
          </div>

          <div class="input-group">
            <label>Telefone</label>
            <input type="tel" id="telefone" placeholder="Seu telefone">
          </div>
        </div>

        <button class="btn-green" onclick="salvarPerfil()">Salvar perfil</button>
      </div>

      <div class="section">
        <h3>Preferências</h3>

        <div class="settings-grid">
          <div class="settings-card">
            <h4>Relatórios</h4>
            <label class="checkbox">
              <input type="checkbox" id="emailCheck">
              Receber relatórios por e-mail
            </label>
          </div>

          <div class="settings-card">
            <h4>Novidades</h4>
            <label class="checkbox">
              <input type="checkbox" id="novidadesCheck">
              Quero receber novidades
            </label>
          </div>

          <div class="settings-card">
            <h4>Lembretes</h4>
            <label class="checkbox">
              <input type="checkbox" id="lembretesCheck">
              Ativar lembretes automáticos
            </label>
          </div>

          <div class="settings-card">
            <h4>Notificações</h4>
            <label class="checkbox">
              <input type="checkbox" id="notifEmailCheck">
              Receber notificações por e-mail
            </label>

            <label class="checkbox">
              <input type="checkbox" id="notifSistemaCheck">
              Receber notificações no sistema
            </label>
          </div>
        </div>
      </div>

      <div class="section">
        <h3>Feedback</h3>
        <p class="small">Deixe sua opinião sobre a plataforma.</p>

        <div class="input-group">
          <textarea id="feedbackTexto" class="feedback-textarea" placeholder="Escreva seu feedback..."></textarea>
        </div>

        <button class="button" onclick="enviarFeedback()">Enviar feedback</button>
      </div>

      <div class="section">
        <h3>Suporte</h3>
        <p class="small">Está com algum problema?</p>

        <button class="button" onclick="abrirSuporte()">Falar com suporte</button>
      </div>

    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/configuration.js"></script>
</body>
</html>
