services:

  api:
    build: .
    container_name: visionia_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Banco de dados persiste fora do container
      - ./usuarios.db:/app/usuarios.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: nginx:alpine
    container_name: visionia_frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend-principal:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped
